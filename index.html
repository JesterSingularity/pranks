<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Это ты?</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    overflow: hidden;
}

.container {
    text-align: center;
    color: white;
}

h1 {
    font-size: 5rem;
    margin-bottom: 40px;
    text-shadow: 0 5px 20px rgba(0,0,0,0.25);
}

.buttons {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
}

button {
    border: none;
    padding: 18px 36px;
    font-size: 1.2rem;
    border-radius: 18px;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

#yesBtn {
    background: white;
    color: #5b4fd1;
    font-weight: bold;
}

#yesBtn:hover {
    transform: translateY(-3px);
}

#noBtn {
    background: rgba(255,255,255,0.15);
    color: white;
    backdrop-filter: blur(10px);
}

.result {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: bold;
    color: white;
    text-shadow: 0 5px 20px rgba(0,0,0,0.3);
    animation: appear 0.5s ease;
}

@keyframes appear {
    from {
        opacity: 0;
        transform: scale(0.8);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

.shake {
    animation: shake 0.3s ease;
    background: rgba(255, 80, 80, 0.8) !important;
}

@keyframes shake {
    0% { transform: translate(0,0); }
    20% { transform: translate(-4px,2px); }
    40% { transform: translate(4px,-2px); }
    60% { transform: translate(-3px,-2px); }
    80% { transform: translate(3px,2px); }
    100% { transform: translate(0,0); }
}
</style>
</head>

<body>

<div class="container" id="main">
    <h1>Лошара 🤣</h1>

    <div class="buttons">
        <button id="yesBtn">Да, это я!!!</button>
        <button id="noBtn">Сам такой</button>
    </div>
</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const main = document.getElementById("main");

yesBtn.addEventListener("click", () => {
    main.innerHTML = '<div class="result">*заскринил и всем рассказал*</div>';
});

noBtn.addEventListener("click", () => {
    const btnWidth = noBtn.offsetWidth;
    const btnHeight = noBtn.offsetHeight;

    const maxX = window.innerWidth - btnWidth - 20;
    const maxY = window.innerHeight - btnHeight - 20;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.position = "fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    noBtn.classList.add("shake");

    setTimeout(() => {
        noBtn.classList.remove("shake");
    }, 1000);
});
</script>

</body>
</html>
